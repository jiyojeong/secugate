name: iac-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      TF_DIR: ./
      OUT_DIR: ./artifacts
      RULES_FILE: ./secugate/src/secugate/rules/attack_mapping.json
      TF_CLI_ARGS_plan: -var-file=terraform_ci.tfvars


    steps:

      - name: Checkout Terraform repo
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
          
      - name: Checkout secugate repo
        uses: actions/checkout@v4
        with:
          repository: jiyojeong/secugate
          path: secugate
          token: ${{ secrets.SECUGATE_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Debug terraform context
        run: |
          pwd
          ls -la
          echo "TF_DIR=${TF_DIR}"
          find "${TF_DIR}" -maxdepth 2 \( -name "*.tf" -o -name "*.tfvars" \) | sort
      - name: Install secugate
        run: |
          python -m pip install --upgrade pip
          pip install -e ./secugate
      - name: Run secugate
        run: |
          python ./secugate/main.py run \
            --tf "${TF_DIR}" \
            --out "${OUT_DIR}" \
            --rules "${RULES_FILE}" \
            --no-cache
      - name: Gate
        run: |
          python ./secugate/scripts/gate_attack_scenarios.py \
            --input "${OUT_DIR}/attack_scenarios.json" \
            --fail-on-score high \
            --max-unmapped-check-ids 0
